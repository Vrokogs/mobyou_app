<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8871E"/>
      <stop offset="50%" style="stop-color:#D4731A"/>
      <stop offset="100%" style="stop-color:#B85E14"/>
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a3050"/>
      <stop offset="100%" style="stop-color:#0A1628"/>
    </linearGradient>
  </defs>
  <!-- Shield background -->
  <path d="M100 10 L180 50 L180 120 Q180 170 100 190 Q20 170 20 120 L20 50 Z" fill="url(#shieldGrad)" stroke="url(#orangeGrad)" stroke-width="3"/>
  <!-- Inner shield -->
  <path d="M100 25 L165 58 L165 115 Q165 158 100 175 Q35 158 35 115 L35 58 Z" fill="none" stroke="url(#orangeGrad)" stroke-width="1.5" opacity="0.4"/>
  <!-- M Letter -->
  <text x="100" y="105" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="72" font-weight="900" fill="url(#orangeGrad)">M</text>
  <!-- MOBYOU text -->
  <text x="100" y="135" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="url(#orangeGrad)" letter-spacing="6">MOBYOU</text>
  <!-- Subtitle -->
  <text x="100" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#8094b0" letter-spacing="2">MOBILIDADE ELÉTRICA</text>
  <!-- Bottom text -->
  <text x="100" y="172" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="700" fill="url(#orangeGrad)" letter-spacing="3">LITORAL NORTE</text>
</svg>
